<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Scholar Spark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
<header class="navbar">
    <div class="logo">
        <img src="images/logo.png" alt="Scholar Spark Logo">
    </div>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="platform.html">Platform</a>
        <a href="resources.html">Resources</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>
<section class="hero">
    <h1>Contact & Feedback</h1>
    <p>Send us your questions or feedback.</p>
</section>
<section class="contact-container">
    <div class="contact-form">
        <h2>Contact Form</h2>
        <form action="https://formspree.io/f/mwvykler" method="POST">
            <label>Name:</label>
            <input type="text" placeholder="Your name" required>
            <label>Email:</label>
            <input type="email" placeholder="Your email" required>
            <label>Subject:</label>
            <input type="text" placeholder="Subject">
            <label>Message:</label>
            <textarea rows="4" placeholder="Your message" required></textarea>
            <label>How did you hear about us?</label>
            <div class="radio-group">
                <label><input type="radio" name="source" value="Google"> Google</label> 
                <label><input type="radio" name="source" value="Social"> Social Media</label>
                <label><input type="radio" name="source" value="Friend"> Friend</label>
            </div>
            <label class="checkbox">
                <input type="checkbox" required> I agree to the privacy policy
            </label>
            <input type="hidden" name="_next" value="success.html">
            <button class="btn primary">Send Message</button>
        </form>
    </div>
    <div class="contact-info">
        <h2>Office Info</h2>
        <p><strong>Email:</strong><br> hello@scholarspark.co</p>
        <p><strong>Phone:</strong><br> 267 76177464</p>
        <p><strong>Hours:</strong><br> Mon–Fri, 9am–5pm</p>
        <div class="map">
            <iframe
             src="https://www.google.com/maps?q=Gaborone,Botswana&output=embed"
             width="100%"
             height="150"
             style="border:0; border-radius:8px;"
             allowfullscreen=""
             loading="lazy">
            </iframe>
        </div>
    </div>
</section>
<footer>
    <p>© 2026 Scholar Spark | Privacy | Terms</p>
</footer>
<script src="script.js"></script>
</body>
</html>
